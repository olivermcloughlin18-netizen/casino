<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Night</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080808;
  --surface: #111;
  --border: #222;
  --gold: #c9a84c;
  --red: #cc3333;
  --blue: #3366cc;
  --green: #2d7a2d;
  --purple: #7733cc;
  --cyan: #22aaaa;
  --text: #ddd;
  --dim: #555;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--text); font-family:'Space Mono',monospace; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:1rem 0.8rem 3rem; }

/* ── SCREENS ── */
.screen { display:none; flex-direction:column; align-items:center; width:100%; max-width:700px; }
.screen.active { display:flex; }

/* ── HOME ── */
#home { gap:1.2rem; margin-top:1.5rem; }
.home-title { font-family:'Bebas Neue',sans-serif; font-size:3.5rem; letter-spacing:0.3em; color:#fff; text-align:center; line-height:1; }
.home-sub { color:var(--dim); font-size:0.65rem; letter-spacing:0.35em; margin-bottom:0.5rem; }
.game-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.7rem; width:100%; }
.game-card { background:var(--surface); border:2px solid var(--border); border-radius:12px; padding:1.1rem 1rem; cursor:pointer; text-align:left; transition:border-color 0.15s, transform 0.12s, background 0.15s; }
.game-card:hover { transform:translateY(-3px); background:#161616; }
.game-card .gc-icon { font-size:2rem; margin-bottom:0.4rem; display:block; }
.game-card .gc-name { font-family:'Bebas Neue',sans-serif; font-size:1.15rem; letter-spacing:0.12em; }
.game-card .gc-desc { font-size:0.6rem; color:var(--dim); margin-top:0.2rem; line-height:1.4; }
.game-card.bj     { border-color:#333; } .game-card.bj:hover     { border-color:var(--gold); } .game-card.bj .gc-name { color:var(--gold); }
.game-card.poker  { border-color:#333; } .game-card.poker:hover  { border-color:var(--red);  } .game-card.poker .gc-name { color:var(--red); }
.game-card.roul   { border-color:#333; } .game-card.roul:hover   { border-color:var(--green);} .game-card.roul .gc-name { color:var(--green); }
.game-card.cats   { border-color:#333; } .game-card.cats:hover   { border-color:var(--blue); } .game-card.cats .gc-name { color:var(--blue); }
.game-card.trivia { border-color:#333; } .game-card.trivia:hover { border-color:var(--purple);} .game-card.trivia .gc-name { color:var(--purple); }

/* ── LOBBY ── */
#lobby { gap:0.8rem; margin-top:1.5rem; max-width:320px; }
.lobby-game-title { font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:0.2em; }
input, select { width:100%; padding:0.6rem 0.9rem; background:#0d0d0d; border:1px solid var(--border); border-radius:6px; color:#fff; font-size:0.95rem; font-family:'Space Mono',monospace; text-align:center; outline:none; }
input:focus { border-color:var(--dim); }
.btn { padding:0.55rem 1.1rem; border:none; border-radius:6px; font-family:'Space Mono',monospace; font-size:0.85rem; cursor:pointer; transition:opacity 0.1s, transform 0.1s; letter-spacing:0.05em; }
.btn:hover { opacity:0.88; transform:translateY(-1px); }
.btn:active { opacity:0.7; transform:translateY(0); }
.btn-create { background:#1a3a1a; color:#7fc97f; border:1px solid #2a5a2a; width:100%; }
.btn-join   { background:#1a1a3a; color:#7f9fff; border:1px solid #2a2a5a; }
.btn-leave  { background:none; border:1px solid #2a1a1a; color:#664444; font-size:0.7rem; padding:0.3rem 0.7rem; }
.btn-action { background:#1a2a1a; color:#aaa; border:1px solid #2a3a2a; }
.btn-gold   { background:#2a1f05; color:var(--gold); border:1px solid #3a2f10; }
.btn-red    { background:#2a0808; color:#ff8888; border:1px solid #3a1818; }
.btn-green  { background:#082a08; color:#88ff88; border:1px solid #184a18; }
.btn-blue   { background:#08082a; color:#8888ff; border:1px solid #18183a; }
.btn-purple { background:#1a082a; color:#cc88ff; border:1px solid #2a183a; }
.btn-start  { background:#1a3a1a; color:#7fc97f; border:1px solid #2a6a2a; padding:0.6rem 1.4rem; font-size:0.9rem; }
.join-row { display:flex; gap:0.5rem; width:100%; }
.join-row input { flex:1; text-transform:uppercase; letter-spacing:0.2em; }
.lobby-err { color:#f66; font-size:0.75rem; min-height:1rem; text-align:center; }
.back-link { background:none; border:none; color:var(--dim); font-size:0.72rem; cursor:pointer; font-family:inherit; letter-spacing:0.1em; }
.back-link:hover { color:#888; }

/* ── CODE BOX ── */
#code-box { display:none; background:#0a0a0a; border-radius:10px; padding:1rem 1.5rem; text-align:center; width:100%; max-width:320px; border:2px solid var(--border); margin-top:0.5rem; }
.code-label { font-size:0.6rem; letter-spacing:0.3em; color:var(--dim); margin-bottom:0.3rem; }
#code-val { font-family:'Bebas Neue',sans-serif; font-size:3rem; letter-spacing:0.5em; }
.code-hint { color:#333; font-size:0.62rem; margin-top:0.3rem; }
.btn-copy { margin-top:0.5rem; background:#111; border:1px solid #222; border-radius:5px; padding:0.3rem 1rem; font-size:0.72rem; cursor:pointer; font-family:inherit; color:#666; }

/* ── GAME SHELL ── */
#game-shell { gap:0.7rem; }
.g-header { display:flex; justify-content:space-between; align-items:center; width:100%; font-size:0.7rem; color:var(--dim); padding:0.2rem 0; }
.g-phase { font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:0.2em; }
.g-players-bar { display:flex; flex-wrap:wrap; gap:0.35rem; justify-content:center; width:100%; }
.pchip { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:0.2rem 0.65rem; font-size:0.7rem; color:var(--dim); }
.pchip.me     { border-color:#446; color:#88f; }
.pchip.ready  { border-color:#282; color:#8f8; }
.pchip.active { border-color:var(--gold); color:var(--gold); }

/* ── SHARED TABLE ── */
.table-felt { background:radial-gradient(ellipse at 50% 40%, #0f3a0f 0%, #071a07 80%); border:3px solid #3a2a05; border-radius:16px; width:100%; padding:0.9rem; position:relative; }
.pot-display { text-align:center; color:var(--gold); font-family:'Bebas Neue',sans-serif; font-size:1.2rem; letter-spacing:0.15em; margin-bottom:0.5rem; }

/* ── CARDS ── */
.card { width:42px; height:60px; background:#fff; border-radius:5px; display:flex; flex-direction:column; align-items:center; justify-content:center; border:1px solid #ccc; flex-shrink:0; position:relative; }
.card .cr { font-size:0.82rem; font-weight:700; line-height:1; }
.card .cs { font-size:0.72rem; line-height:1; }
.card.red { color:#c00; }
.card.blk { color:#111; }
.card.back { background:linear-gradient(135deg,#1a2a7a,#0d1545); border-color:#2233aa; color:transparent; }
.card.back::after { content:'🂠'; font-size:1.4rem; position:absolute; color:rgba(255,255,255,0.4); }
.card.sm { width:30px; height:42px; }
.card.sm .cr { font-size:0.6rem; }
.card.sm .cs { font-size:0.5rem; }
.card.sm.back::after { font-size:1rem; }
.card-ph { border:2px dashed #1a2a1a; border-radius:5px; background:transparent; }
.cards-row { display:flex; gap:0.4rem; justify-content:center; flex-wrap:wrap; align-items:center; min-height:64px; }

/* ── BLACKJACK ── */
#bj-game { display:none; flex-direction:column; gap:0.6rem; width:100%; }
.bj-section { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:0.5rem 0.7rem; }
.bj-label { font-size:0.65rem; color:var(--dim); letter-spacing:0.2em; margin-bottom:0.3rem; }
.bj-score { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; color:var(--gold); }
#bj-result { text-align:center; font-family:'Bebas Neue',sans-serif; font-size:1.6rem; letter-spacing:0.1em; min-height:2rem; }
#bj-btns { display:flex; gap:0.5rem; justify-content:center; flex-wrap:wrap; }
#bj-scoreboard { display:flex; flex-wrap:wrap; gap:0.4rem; justify-content:center; }
.score-pill { background:#0d0d0d; border:1px solid var(--border); border-radius:6px; padding:0.25rem 0.6rem; font-size:0.72rem; text-align:center; }
.score-pill .sp-name { color:var(--dim); font-size:0.6rem; }
.score-pill .sp-val  { color:var(--gold); font-weight:700; }

/* ── POKER ── */
#poker-game { display:none; flex-direction:column; gap:0.6rem; width:100%; }
.p-players-grid { display:flex; flex-wrap:wrap; gap:0.5rem; justify-content:center; width:100%; }
.pbox { background:#0a0a0a; border:1px solid #1f1f1f; border-radius:8px; padding:0.4rem 0.6rem; min-width:100px; flex:1; max-width:155px; }
.pbox.me     { border-color:#334; }
.pbox.onturn { border-color:var(--gold); box-shadow:0 0 8px rgba(201,168,76,0.3); }
.pbox.folded { opacity:0.38; }
.pbox.won    { border-color:#4f4; box-shadow:0 0 10px rgba(80,255,80,0.3); }
.pn { font-size:0.72rem; color:var(--dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.pn.dlr::before { content:'D '; color:var(--gold); }
.pstack { font-family:'Bebas Neue',sans-serif; font-size:1rem; color:var(--gold); }
.pbet { font-size:0.65rem; color:#444; min-height:0.8rem; }
.pst  { font-size:0.6rem;  color:#444; min-height:0.75rem; }
.pcards { display:flex; gap:2px; margin-top:0.25rem; }
#my-hole { background:#050505; border:1px solid #1a2a1a; border-radius:8px; padding:0.6rem; width:100%; text-align:center; }
#my-hole .cards-row .card { width:50px; height:70px; }
#my-hole .cards-row .card .cr { font-size:1rem; }
#my-hole .cards-row .card .cs { font-size:0.85rem; }
#hole-rank { color:var(--gold); font-size:0.78rem; margin-top:0.3rem; min-height:1rem; }
#poker-actions { display:none; flex-direction:column; align-items:center; gap:0.5rem; width:100%; }
#poker-actmsg { color:var(--gold); font-size:0.78rem; min-height:1rem; text-align:center; }
#poker-btns { display:flex; gap:0.5rem; flex-wrap:wrap; justify-content:center; }
#raise-row { display:none; align-items:center; gap:0.4rem; }
#raise-row input { width:75px; padding:0.4rem 0.5rem; font-size:0.85rem; }
#poker-log { background:#050505; border:1px solid #111; border-radius:6px; width:100%; padding:0.4rem 0.6rem; max-height:80px; overflow-y:auto; }
#poker-log div { font-size:0.63rem; color:#333; border-bottom:1px solid #0a0a0a; padding:0.08rem 0; }
#poker-log div:last-child { color:#666; }

/* ── ROULETTE ── */
#roul-game { display:none; flex-direction:column; gap:0.6rem; width:100%; }
#roul-wheel { width:180px; height:180px; border-radius:50%; background:conic-gradient(#111 0deg, #c00 0deg); border:3px solid #333; margin:0 auto; position:relative; transition:transform 1.5s cubic-bezier(0.17,0.67,0.15,1); display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue',sans-serif; font-size:2rem; color:var(--gold); }
.roul-bet-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:0.4rem; width:100%; }
.roul-bet-btn { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:0.5rem 0.2rem; font-size:0.75rem; cursor:pointer; text-align:center; font-family:inherit; color:var(--text); transition:border-color 0.1s; }
.roul-bet-btn:hover { border-color:#555; }
.roul-bet-btn.selected { border-color:var(--gold); color:var(--gold); }
.roul-bet-btn.red-btn { color:#f77; }
.roul-bet-btn.black-btn { color:#aaa; }
#roul-input-row { display:flex; align-items:center; gap:0.5rem; }
#roul-input-row input { flex:1; }
#roul-bets-display { display:flex; flex-wrap:wrap; gap:0.3rem; min-height:2rem; }
.roul-active-bet { background:#111; border:1px solid #2a2a1a; border-radius:4px; padding:0.2rem 0.5rem; font-size:0.68rem; color:var(--gold); }
#roul-result { text-align:center; font-family:'Bebas Neue',sans-serif; font-size:1.4rem; min-height:2rem; }
#roul-scoreboard { display:flex; flex-wrap:wrap; gap:0.4rem; justify-content:center; }

/* ── CATEGORIES ── */
#cats-game { display:none; flex-direction:column; gap:0.6rem; width:100%; }
#cats-letter { font-family:'Bebas Neue',sans-serif; font-size:5rem; color:var(--blue); line-height:1; text-align:center; }
#cats-timer { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; color:#fa4; text-align:center; min-height:2.2rem; }
#cats-inputs { display:flex; flex-direction:column; gap:0.4rem; width:100%; }
.cat-row { display:flex; align-items:center; gap:0.6rem; background:var(--surface); border:1px solid var(--border); border-radius:7px; padding:0.45rem 0.7rem; }
.cat-lbl { color:var(--blue); font-size:0.72rem; min-width:120px; flex-shrink:0; }
.cat-inp { flex:1; padding:0.35rem 0.5rem; background:#050505; border:1px solid #1a1a3a; border-radius:4px; color:#fff; font-family:inherit; font-size:0.88rem; }
.cat-inp:focus { border-color:var(--blue); outline:none; }
.cat-inp:disabled { color:#333; border-color:#111; }
#cats-score-table { width:100%; border-collapse:collapse; font-size:0.72rem; }
#cats-score-table th { color:var(--blue); text-align:left; padding:0.3rem 0.4rem; border-bottom:1px solid #1a1a3a; }
#cats-score-table td { padding:0.3rem 0.4rem; border-bottom:1px solid #0d0d0d; }
.ans-ok  { color:#4f4; }
.ans-dup { color:#fa4; }
.ans-bad { color:#f44; }
.veto-btn { background:none; border:1px solid #222; border-radius:3px; color:#444; font-size:0.6rem; cursor:pointer; padding:1px 4px; margin-left:3px; }
.veto-btn.on { border-color:#f44; color:#f44; }
.cats-total-row td { color:var(--blue); font-weight:700; border-top:2px solid #2a2a5a !important; }
#cats-msg { text-align:center; font-size:0.78rem; color:#fa4; min-height:1rem; }

/* ── TRIVIA ── */
#trivia-game { display:none; flex-direction:column; gap:0.6rem; width:100%; }
#trivia-q { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:0.9rem 1rem; font-size:0.9rem; line-height:1.5; text-align:center; min-height:60px; }
#trivia-cat { font-size:0.6rem; color:var(--dim); letter-spacing:0.2em; margin-bottom:0.3rem; }
#trivia-opts { display:grid; grid-template-columns:1fr 1fr; gap:0.5rem; width:100%; }
.trivia-opt { background:#0d0d0d; border:1px solid var(--border); border-radius:8px; padding:0.6rem 0.8rem; font-family:inherit; font-size:0.82rem; color:var(--text); cursor:pointer; text-align:left; line-height:1.35; transition:border-color 0.1s; }
.trivia-opt:hover:not(:disabled) { border-color:#444; }
.trivia-opt.correct { border-color:#4f4; color:#4f4; background:#081408; }
.trivia-opt.wrong   { border-color:#f44; color:#f44; background:#140808; }
.trivia-opt:disabled { cursor:default; }
#trivia-feedback { text-align:center; font-family:'Bebas Neue',sans-serif; font-size:1.4rem; min-height:1.8rem; letter-spacing:0.1em; }
#trivia-timer { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; text-align:center; min-height:2.2rem; }
#trivia-progress { display:flex; gap:0.2rem; width:100%; }
.tpip { flex:1; height:4px; border-radius:2px; background:#1a1a1a; }
.tpip.done { background:var(--purple); }
.tpip.curr { background:#fa4; }
#trivia-scores { display:flex; flex-wrap:wrap; gap:0.4rem; justify-content:center; }
#trivia-msg { text-align:center; font-size:0.78rem; color:#fa4; min-height:1rem; }
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="home-title">GAME<br>NIGHT</div>
  <div class="home-sub">PICK A GAME · SHARE A CODE · PLAY</div>
  <div class="game-grid">
    <button class="game-card bj" onclick="pickGame('bj')">
      <span class="gc-icon">🃏</span>
      <div class="gc-name">BLACKJACK</div>
      <div class="gc-desc">2–8 players · everyone vs dealer · bet & beat 21</div>
    </button>
    <button class="game-card poker" onclick="pickGame('poker')">
      <span class="gc-icon">♠</span>
      <div class="gc-name">TEXAS HOLD'EM</div>
      <div class="gc-desc">2–8 players · real poker · blinds & betting</div>
    </button>
    <button class="game-card roul" onclick="pickGame('roul')">
      <span class="gc-icon">🎡</span>
      <div class="gc-name">ROULETTE</div>
      <div class="gc-desc">2–8 players · place bets · spin together</div>
    </button>
    <button class="game-card cats" onclick="pickGame('cats')">
      <span class="gc-icon">⚡</span>
      <div class="gc-name">CATEGORIES</div>
      <div class="gc-desc">2–10 players · Scattergories · 5 rounds</div>
    </button>
    <button class="game-card trivia" onclick="pickGame('trivia')" style="grid-column:span 2">
      <span class="gc-icon">🧠</span>
      <div class="gc-name">TRIVIA</div>
      <div class="gc-desc">2–10 players · 10 questions · fastest finger wins</div>
    </button>
  </div>
</div>

<!-- LOBBY -->
<div id="lobby" class="screen">
  <div class="lobby-game-title" id="lobby-title">GAME</div>
  <input id="name-inp" placeholder="Your name" maxlength="16">
  <button class="btn btn-create" onclick="hostGame()">CREATE GAME</button>
  <div style="color:#333;font-size:0.72rem;text-align:center">— or join with a code —</div>
  <div class="join-row">
    <input id="code-inp" placeholder="XXXXXX" maxlength="6">
    <button class="btn btn-join" onclick="joinGame()">JOIN</button>
  </div>
  <div class="lobby-err" id="lobby-err"></div>
  <button class="back-link" onclick="goHome()">← back</button>
</div>

<!-- CODE BOX -->
<div id="code-box">
  <div class="code-label">SHARE THIS CODE</div>
  <div id="code-val">——————</div>
  <div class="code-hint">Friends open this page, pick the same game, enter code</div>
  <button class="btn-copy" onclick="copyCode()">📋 COPY</button>
</div>

<!-- GAME SHELL -->
<div id="game-shell" class="screen">
  <div class="g-header">
    <span id="g-label" style="font-family:'Bebas Neue',sans-serif;font-size:0.9rem;letter-spacing:0.15em"></span>
    <span class="g-phase" id="g-phase">LOBBY</span>
    <button class="btn btn-leave" onclick="leaveGame()">✕ LEAVE</button>
  </div>
  <div class="g-players-bar" id="g-players-bar"></div>

  <!-- BLACKJACK -->
  <div id="bj-game">
    <div class="table-felt">
      <div class="bj-section" style="background:transparent;border:none;padding:0.2rem 0">
        <div class="bj-label">DEALER</div>
        <div class="cards-row" id="bj-dealer-cards"></div>
        <div class="bj-score" id="bj-dealer-score">—</div>
      </div>
    </div>
    <div class="bj-section">
      <div class="bj-label">YOUR HAND</div>
      <div class="cards-row" id="bj-player-cards"></div>
      <div class="bj-score" id="bj-player-score">—</div>
    </div>
    <div id="bj-result"></div>
    <div id="bj-btns"></div>
    <div id="bj-scoreboard"></div>
    <div id="bj-startrow" style="text-align:center"></div>
  </div>

  <!-- POKER -->
  <div id="poker-game">
    <div class="table-felt">
      <div class="pot-display" id="poker-pot">POT: $0</div>
      <div class="cards-row" id="poker-community"></div>
      <div id="poker-waiting" style="color:#2a4a2a;text-align:center;font-size:0.8rem;padding:0.3rem"></div>
    </div>
    <div class="p-players-grid" id="poker-players"></div>
    <div id="my-hole" style="display:none">
      <div class="cards-row" id="my-hole-cards"></div>
      <div id="hole-rank"></div>
    </div>
    <div id="poker-actions">
      <div id="poker-actmsg"></div>
      <div id="poker-btns"></div>
      <div id="raise-row">
        <span style="color:#aaa;font-size:0.75rem">Raise to $</span>
        <input id="raise-inp" type="number">
        <button class="btn btn-gold" onclick="pokerRaise()">GO</button>
      </div>
    </div>
    <div id="poker-startrow" style="text-align:center"></div>
    <div id="poker-log"></div>
  </div>

  <!-- ROULETTE -->
  <div id="roul-game">
    <div id="roul-wheel">?</div>
    <div class="roul-bet-grid" id="roul-bet-grid"></div>
    <div id="roul-input-row">
      <span style="color:var(--dim);font-size:0.75rem">Bet $</span>
      <input id="roul-amt" type="number" value="50" style="width:80px">
      <button class="btn btn-gold" onclick="roulPlaceBet()">BET</button>
      <button class="btn btn-action" onclick="roulClearBets()">CLEAR</button>
    </div>

function pActivePids(g){ return Object.keys(g.players||{}).filter(function(pid){ return g.players[pid].stack>=0; }); }
function pNext(g,from,skipFrom){
  var pids=pActivePids(g),idx=pids.indexOf(from);
  for(var i=1;i<=pids.length;i++){ var pid=pids[(idx+i)%pids.length]; if(skipFrom&&pid===from) continue; if(!g.players[pid].folded) return pid; }
  return from;
}
function pokerStart(){
  if(!G) return;
  var g=G,players=g.players||{},pids=Object.keys(players).filter(function(pid){ return players[pid].stack>0; });
  if(pids.length<2){ alert('Need 2+ players with chips.'); return; }
  var deck=makeDeck(),n=pids.length;
  var di=((g.dealer||0)+1)%n,sbi=(di+1)%n,bbi=(di+2)%n,fi=n===2?sbi:(di+3)%n;
  var upd={}; pids.forEach(function(pid){ upd['players/'+pid+'/bet']=0; upd['players/'+pid+'/folded']=false; });
  var hands={}; pids.forEach(function(pid){ hands[pid]=[deck.pop(),deck.pop()].join(','); });
  var sba=Math.min(SB,players[pids[sbi]].stack),bba=Math.min(BB,players[pids[bbi]].stack);
  upd['players/'+pids[sbi]+'/stack']=players[pids[sbi]].stack-sba; upd['players/'+pids[sbi]+'/bet']=sba;
  upd['players/'+pids[bbi]+'/stack']=players[pids[bbi]].stack-bba; upd['players/'+pids[bbi]+'/bet']=bba;
  upd.phase='preflop'; upd.pot=sba+bba; upd.community=''; upd.deck=deck.join(','); upd.hands=hands;
  upd.currentBet=bba; upd.actionOn=pids[fi%n]; upd.dealer=di; upd.winners=''; upd.actedStr=pids[sbi]+','+pids[bbi];
  tRef.update(upd);
  pLog('--- New Hand ---'); pLog(players[pids[sbi]].name+' SB $'+sba); pLog(players[pids[bbi]].name+' BB $'+bba);
}
function pokerAction(type){
  if(!G||G.actionOn!==myId) return;
  var g=G,players=g.players||{},me=players[myId],upd={},foldSelf=false;
  if(type==='fold'){
    upd['players/'+myId+'/folded']=true; foldSelf=true; pLog(myName+' folds');
    var rem=pActivePids(g).filter(function(pid){ return !players[pid].folded&&pid!==myId; });
    if(rem.length===1){ upd['players/'+rem[0]+'/stack']=players[rem[0]].stack+g.pot; upd.pot=0; upd.phase='showdown'; upd.winners=rem[0]; pLog(players[rem[0]].name+' wins $'+g.pot); tRef.update(upd); return; }
  }
  if(type==='check') pLog(myName+' checks');
  if(type==='call'){ var tc=Math.min((g.currentBet||0)-(me.bet||0),me.stack); upd['players/'+myId+'/stack']=me.stack-tc; upd['players/'+myId+'/bet']=(me.bet||0)+tc; upd.pot=(g.pot||0)+tc; pLog(myName+' calls $'+tc); }
  var acted=(g.actedStr||'').split(',').filter(Boolean); if(acted.indexOf(myId)<0) acted.push(myId); upd.actedStr=acted.join(',');
  var pids=pActivePids(g),stillIn=pids.filter(function(pid){ return !(foldSelf&&pid===myId)&&!players[pid].folded; });
  var myNewBet=(upd['players/'+myId+'/bet']!==undefined?upd['players/'+myId+'/bet']:me.bet)||0;
  var curBet=(upd.currentBet!==undefined?upd.currentBet:g.currentBet)||0;
  var lvl=stillIn.every(function(pid){ return (pid===myId?myNewBet:(players[pid].bet||0))>=curBet; });
  var allAct=stillIn.every(function(pid){ return acted.indexOf(pid)>=0; });
  if(allAct&&lvl) pokerAdvance(g,upd,stillIn); else{ upd.actionOn=pNext(g,myId,foldSelf); tRef.update(upd); }
}
function pokerRaise(){
  if(!G||G.actionOn!==myId) return;
  var g=G,me=g.players[myId],amount=parseInt(document.getElementById('raise-inp').value)||0;
  if(amount<=(g.currentBet||0)){ alert('Must be above $'+(g.currentBet||0)); return; }
  var diff=amount-(me.bet||0),upd={};
  upd['players/'+myId+'/stack']=me.stack-diff; upd['players/'+myId+'/bet']=amount;
  upd.pot=(g.pot||0)+diff; upd.currentBet=amount; upd.actedStr=myId;
  upd.actionOn=pNext(g,myId,false);
  document.getElementById('raise-row').style.display='none';
  pLog(myName+' raises to $'+amount); tRef.update(upd);
}
function pokerAdvance(g,upd,stillIn){
  var deck=(g.deck||'').split(',').filter(Boolean),comm=(g.community||'').split(',').filter(Boolean);
  var phase=g.phase,players=g.players||{},pids=pActivePids(g);
  var extra=0; pids.forEach(function(pid){ if(upd['players/'+pid+'/bet']===undefined){ extra+=players[pid].bet||0; upd['players/'+pid+'/bet']=0; } });
  upd.pot=(upd.pot!==undefined?upd.pot:g.pot||0)+extra; upd.currentBet=0; upd.actedStr='';
  if(phase==='preflop'){ comm.push(deck.pop(),deck.pop(),deck.pop()); upd.phase='flop'; pLog('Flop: '+comm.slice(-3).join(' ')); }
  else if(phase==='flop'){ comm.push(deck.pop()); upd.phase='turn'; pLog('Turn: '+comm[comm.length-1]); }
  else if(phase==='turn'){ comm.push(deck.pop()); upd.phase='river'; pLog('River: '+comm[comm.length-1]); }
  else{ pokerShowdown(g,upd,stillIn,comm); return; }
  upd.community=comm.join(','); upd.deck=deck.join(',');
  var di=g.dealer||0; for(var i=1;i<=pids.length;i++){ var pid=pids[(di+i)%pids.length]; if(!players[pid].folded){ upd.actionOn=pid; break; } }
  tRef.update(upd);
}
function pokerShowdown(g,upd,stillIn,comm){
  var players=g.players||{},pot=upd.pot||g.pot||0,scores={};
  stillIn.forEach(function(pid){ var hole=(g.hands&&g.hands[pid])?(g.hands[pid].split(',').filter(Boolean)):[];  var b=pBest7(hole.concat(comm)); scores[pid]=b?b.score:[0]; });
  var best=null; stillIn.forEach(function(pid){ if(!best||pCmp(scores[pid],best)>0) best=scores[pid]; });
  var winners=stillIn.filter(function(pid){ return pCmp(scores[pid],best)===0; });
  var share=Math.floor(pot/winners.length);
  winners.forEach(function(pid){ var cur=upd['players/'+pid+'/stack']!==undefined?upd['players/'+pid+'/stack']:players[pid].stack; upd['players/'+pid+'/stack']=(cur||0)+share; pLog(players[pid].name+' wins $'+share+' ('+PHAND_NAMES[best[0]]+')'); });
  upd.pot=0; upd.phase='showdown'; upd.winners=winners.join(','); upd.community=comm.join(',');
  tRef.update(upd);
}

function roulSpin(){

    var delta=0;
    bets.forEach(function(b){
      var win=false;
      if(b.type==='red'&&isRed&&n!==0) win=true; if(b.type==='black'&&!isRed&&n!==0) win=true;
      if(b.type==='even'&&n%2===0&&n!==0) win=true; if(b.type==='odd'&&n%2===1) win=true;

  {q:"What element has atomic number 1?",opts:["Helium","Oxygen","Hydrogen","Carbon"],a:2,cat:"Science"},
  {q:"Which country invented pizza?",opts:["France","Spain","Greece","Italy"],a:3,cat:"Food"},
  {q:"How many bones are in the human body?",opts:["196","206","216","226"],a:1,cat:"Science"},
  {q:"What is the currency of Japan?",opts:["Won","Yuan","Yen","Ringgit"],a:2,cat:"Geography"},
  {q:"Who directed Jurassic Park?",opts:["James Cameron","George Lucas","Steven Spielberg","Ridley Scott"],a:2,cat:"Film"},
  {q:"What is the square root of 144?",opts:["11","12","13","14"],a:1,cat:"Math"},
  {q:"Which ocean is the largest?",opts:["Atlantic","Indian","Arctic","Pacific"],a:3,cat:"Geography"},
  {q:"In which year was the iPhone first released?",opts:["2005","2006","2007","2008"],a:2,cat:"Technology"},
  {q:"What colour is a polar bear's fur?",opts:["White","Yellow","Clear/Hollow","Grey"],a:2,cat:"Science"}
];

function renderTrivia(g){
  var players=g.players||{},pids=Object.keys(players),phase=g.phase||'lobby';
  var sr=document.getElementById('trivia-startrow'); sr.innerHTML='';
  var totalQ=10;
  // progress pips
  var prog=document.getElementById('trivia-progress'); prog.innerHTML='';
  for(var i=0;i<totalQ;i++){ var pip=document.createElement('div'); pip.className='tpip'+(i<(g.qIdx||0)?' done':i===(g.qIdx||0)&&phase==='playing'?' curr':''); prog.appendChild(pip); }
  if(phase==='lobby'){
    document.getElementById('trivia-qtext').textContent='Waiting to start...';
    document.getElementById('trivia-opts').innerHTML='';
    document.getElementById('trivia-feedback').textContent='';
    document.getElementById('trivia-timer').textContent='';
    if(amHost&&pids.length>=1) sr.innerHTML='<button class="btn btn-start" onclick="triviaNext(true)">▶ START TRIVIA</button>';
  }
  if(phase==='playing'){
    clearInterval(triviaTimer);
    var qdata=QUESTIONS[g.qIdx||0]||QUESTIONS[0];
    document.getElementById('trivia-cat').textContent=qdata.cat;
    document.getElementById('trivia-qtext').textContent=g.question||qdata.q;
    triviaTimer=setInterval(function(){ var s=Math.max(0,Math.ceil(((G&&G.endTime)||0)-Date.now())/1000); document.getElementById('trivia-timer').textContent=Math.ceil(s)+'s'; if(s<=0){ clearInterval(triviaTimer); if(amHost) triviaReveal(); } },400);
    var opts=(g.options||'').split('|'),myAns=g.answered&&g.answered[myId]!=null?g.answered[myId]:-1;
    var ob=document.getElementById('trivia-opts'); ob.innerHTML='';
    opts.forEach(function(opt,i){
      var btn=document.createElement('button'); btn.className='trivia-opt'; btn.textContent=opt; btn.disabled=myAns!==-1;
      if(myAns===i) btn.style.borderColor='#666';
      btn.onclick=(function(idx){ return function(){ triviaAnswer(idx); }; })(i);
      ob.appendChild(btn);
    });
    document.getElementById('trivia-feedback').textContent=myAns!==-1?'Answer locked in!':'';
    document.getElementById('trivia-feedback').style.color='#fa4';
  }
  if(phase==='reveal'){
    clearInterval(triviaTimer); document.getElementById('trivia-timer').textContent='';
    var qdata2=QUESTIONS[g.qIdx||0]||QUESTIONS[0];
    var correct=g.correctIdx!=null?g.correctIdx:qdata2.a;
    var opts2=(g.options||'').split('|');
    var ob2=document.getElementById('trivia-opts'); ob2.innerHTML='';
    opts2.forEach(function(opt,i){
      var btn=document.createElement('button'); btn.className='trivia-opt'+(i===correct?' correct':''); btn.textContent=opt; btn.disabled=true;
      var myAns=g.answered&&g.answered[myId]!=null?g.answered[myId]:-1;
      if(i===myAns&&i!==correct) btn.classList.add('wrong');
      ob2.appendChild(btn);
    });
    var fb=document.getElementById('trivia-feedback');
    var myAns2=g.answered&&g.answered[myId]!=null?g.answered[myId]:-1;
    if(myAns2===correct){ fb.textContent='✓ CORRECT!'; fb.style.color='#4f4'; }
    else if(myAns2===-1){ fb.textContent='TIME UP'; fb.style.color='#f44'; }
    else { fb.textContent='✗ WRONG'; fb.style.color='#f44'; }
    if(amHost){ var isLast=(g.qIdx||0)>=totalQ-1; sr.innerHTML='<button class="btn btn-start" onclick="triviaNext(false)">'+(isLast?'🏆 FINAL SCORES':'▶ NEXT QUESTION')+'</button>'; }
  }
  if(phase==='done'){
    clearInterval(triviaTimer);
    var sc=g.scores||{}, sb=document.getElementById('trivia-scores'); sb.innerHTML='';
    var sorted=pids.slice().sort(function(a,b){ return (sc[b]||0)-(sc[a]||0); });
    sorted.forEach(function(pid,i){ var p=players[pid]; var chip=document.createElement('div'); chip.className='score-pill'; chip.innerHTML='<div class="sp-name">'+(['🥇','🥈','🥉'][i]||'  ')+' '+p.name+'</div><div class="sp-val">'+(sc[pid]||0)+'</div>'; sb.appendChild(chip); });
    document.getElementById('trivia-opts').innerHTML='';
    document.getElementById('trivia-feedback').textContent='';
    if(amHost) sr.innerHTML='<button class="btn btn-start" onclick="triviaReset()">↺ PLAY AGAIN</button>';
  }
  // show scores in chips during reveal
  if(phase==='reveal'||phase==='playing'){
    var sc2=g.scores||{};
    document.getElementById('trivia-msg').textContent=pids.map(function(pid){ return (g.players[pid].name)+': '+(sc2[pid]||0); }).join(' · ');
  } else document.getElementById('trivia-msg').textContent='';
}

function triviaNext(fresh){
  if(!G) return;
  var g=G,newIdx=fresh?0:(g.qIdx||0)+1,totalQ=10;
  if(newIdx>=totalQ){ tRef.update({phase:'done'}); return; }
  var q=QUESTIONS[newIdx];
  var answered={}; Object.keys(g.players||{}).forEach(function(pid){ answered[pid]=-1; }); // -1 = not answered
  var scores=fresh?{}:g.scores||{};
  tRef.update({phase:'playing',qIdx:newIdx,question:q.q,options:q.opts.join('|'),correctIdx:q.a,category:q.cat,endTime:Date.now()+TRIVIA_SECS*1000,answered:answered,scores:scores});
}
function triviaAnswer(idx){
  if(!G||G.phase!=='playing') return;
  if(G.answered&&G.answered[myId]!==-1) return;
  var timeLeft=Math.max(0,G.endTime-Date.now());
  var speedBonus=Math.floor(timeLeft/1000); // up to 15 bonus points for speed
  tRef.child('answered/'+myId).set(idx);
  if(idx===G.correctIdx){
    var cur=(G.scores&&G.scores[myId])||0;
    tRef.child('scores/'+myId).set(cur+10+speedBonus);
  }
  // check if all answered
  if(amHost){
    var pids=Object.keys(G.players||{});
    // slight delay to wait for other writes
    setTimeout(function(){
      if(!G) return;
      var allDone=pids.every(function(pid){ return G.answered&&G.answered[pid]!==-1; });
      if(allDone) triviaReveal();
    },800);
  }
}
function triviaReveal(){ if(!G||G.phase!=='playing') return; tRef.update({phase:'reveal',endTime:0}); }
function triviaReset(){
  if(!G) return;
  var sc={}, ans={};
  Object.keys(G.players||{}).forEach(function(pid){ sc[pid]=0; ans[pid]=-1; });
  tRef.update({phase:'lobby',qIdx:0,question:'',options:'',answered:ans,scores:sc});
}

// ══════════════════════════════════════
// CLEANUP
// ══════════════════════════════════════
function clearAllTimers(){ clearInterval(catsTimer); clearInterval(triviaTimer); }
</script>
